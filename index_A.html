<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>A - Operator Call</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #ffffff; --orange: #ff9500; --red: #ff3b30; --gray: #f2f2f7; }
        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); 
            margin: 0; display: flex; flex-direction: column; height: 100vh; 
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
        }

        .header { padding: 40px 0 20px 0; text-align: center; }
        h1 { font-size: 24px; font-weight: 900; margin: 0; text-transform: uppercase; }

        .input-box { margin-bottom: 30px; }
        input { 
            width: 100%; padding: 20px; border-radius: 18px; border: 2px solid #ddd; 
            font-size: 28px; font-weight: 800; text-align: center; outline: none; background: #fff;
        }

        /* 核心大按钮样式 */
        .main-btn {
            flex: 1; margin-bottom: 40px; border-radius: 40px; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* 初始状态：白色 */
        .status-none { background: #fff; border: 4px solid var(--gray); color: #000; }
        
        /* 等待状态：橙色闪烁 */
        .status-orange { background: var(--orange); color: #fff; animation: pulse 1.5s infinite; }
        
        /* 维修状态：红色 */
        .status-red { background: var(--red); color: #fff; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .btn-icon { font-size: 60px; margin-bottom: 15px; }
        .btn-text { font-size: 22px; font-weight: 900; text-transform: uppercase; text-align: center; }
        
        .footer-text { text-align: center; padding-bottom: 20px; font-size: 11px; font-weight: 700; color: #ccc; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Chiamata Linea</h1>
    </div>

    <div class="input-box">
        <input type="text" id="lineaInput" placeholder="NUMERO LINEA" autocomplete="off">
    </div>

    <button id="mainBtn" class="main-btn status-none" onclick="sendCall()">
        <div id="btnIcon" class="btn-icon">⚡️</div>
        <div id="statusText" class="btn-text">CHIAMARE ATTREZZISTA</div>
    </button>

    <div class="footer-text">© 2026 HU SHAN. ESSILORLUXOTTICA.</div>

<script>
    // --- FIREBASE 配置 ---
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const mainBtn = document.getElementById('mainBtn');
    const statusText = document.getElementById('statusText');
    const btnIcon = document.getElementById('btnIcon');
    const lineaInput = document.getElementById('lineaInput');

    // 1. 从本地恢复机台号
    let currentId = localStorage.getItem('myLinea') || "";
    if(currentId) {
        lineaInput.value = currentId;
        startListening(currentId);
    }

    // 2. 发起呼叫
    function sendCall() {
        const id = lineaInput.value.trim().toUpperCase();
        if(!id) return alert("Inserire numero linea!");

        // 保存机台号到本地，下次不用重打
        localStorage.setItem('myLinea', id);
        currentId = id;

        // 发送到云端
        db.ref('active_calls/' + id).set({
            startA: Date.now(),
            status: 'orange'
        });

        startListening(id);
    }

    // 3. 核心：监听云端状态变化
    function startListening(id) {
        db.ref('active_calls/' + id).on('value', (snapshot) => {
            const data = snapshot.val();

            // 如果数据被彻底删除，变回初始状态
            if (!data) {
                setInitialUI();
                return;
            }

            switch(data.status) {
                case 'orange':
                    mainBtn.className = "main-btn status-orange";
                    statusText.innerText = "RICHIESTA INVIATA...";
                    btnIcon.innerText = "⏳";
                    break;
                case 'red':
                    mainBtn.className = "main-btn status-red";
                    statusText.innerText = "RIPARAZIONE IN CORSO...";
                    btnIcon.innerText = "🛠";
                    break;
                case 'completed':
                    // B端修完了，A端刷新状态为白色
                    setInitialUI();
                    // 这里可以根据需要删除这条 completed 记录，确保数据库整洁
                    // db.ref('active_calls/' + id).remove(); 
                    break;
                default:
                    setInitialUI();
            }
        });
    }

    function setInitialUI() {
        mainBtn.className = "main-btn status-none";
        statusText.innerText = "CHIAMARE ATTREZZISTA";
        btnIcon.innerText = "⚡️";
    }

    // 当输入框手动修改时，停止旧的监听，开启新的监听（如果新ID已有任务）
    lineaInput.onchange = () => {
        const newId = lineaInput.value.trim().toUpperCase();
        if(newId && newId !== currentId) {
            db.ref('active_calls/' + currentId).off(); // 停止旧监听
            currentId = newId;
            localStorage.setItem('myLinea', newId);
            startListening(newId);
        }
    };
</script>
</body>
</html>
