<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>D - Approval Center</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --orange: #ff9500;
            --green: #34c759;
            --red: #ff3b30;
            --blue: #007aff;
            --gray: #8e8e93;
        }
        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); color: #000;
            margin: 0; padding: calc(20px + env(safe-area-inset-top)) 20px 100px 20px;
        }
        .header { margin-bottom: 25px; display: flex; justify-content: space-between; align-items: flex-end; }
        h1 { font-size: 26px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        .subtitle { color: var(--gray); font-size: 13px; font-weight: 600; text-transform: uppercase; }
        .tabs { display: flex; background: #e3e3e8; padding: 2px; border-radius: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; border: none; padding: 8px; border-radius: 8px; font-weight: 700; font-size: 13px; background: none; color: var(--gray); transition: 0.2s; }
        .tab-btn.active { background: #fff; color: #000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .approval-card {
            background: var(--card); border-radius: 22px; padding: 20px; margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); position: relative;
            animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .id-badge { background: var(--orange); color: #fff; padding: 5px 12px; border-radius: 10px; font-weight: 900; font-size: 16px; }
        .type-tag { font-size: 10px; font-weight: 800; color: var(--gray); border: 1.5px solid var(--gray); padding: 2px 6px; border-radius: 6px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .label { font-size: 10px; color: var(--gray); font-weight: 700; text-transform: uppercase; margin-bottom: 2px; }
        .value { font-size: 14px; font-weight: 700; color: #000; }
        .note-area { background: #f9f9fb; padding: 12px; border-radius: 12px; font-size: 13px; color: #444; border: 1px solid #eee; }
        .actions { display: flex; gap: 12px; margin-top: 20px; }
        .btn { flex: 1; border: none; padding: 16px; border-radius: 16px; font-weight: 800; font-size: 14px; transition: 0.2s; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn-approve { background: var(--green); color: #fff; }
        .btn-reject { background: #fff; color: var(--red); border: 2px solid var(--red); }
        .history-item { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid var(--blue); }
        .history-info { font-size: 12px; color: var(--gray); font-weight: 600; }
        #empty-state { text-align: center; margin-top: 80px; }
        .loader { font-size: 40px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <div class="subtitle">Pannello di Controllo</div>
            <h1>ALEX PORTAL</h1>
        </div>
        <div style="font-size: 20px;">🛡️</div>
    </div>

    <div class="tabs">
        <button id="tabPending" class="tab-btn active" onclick="switchTab('pending')">DA APPROVARE</button>
        <button id="tabHistory" class="tab-btn" onclick="switchTab('history')">CRONOLOGIA</button>
    </div>

    <div id="content-pending">
        <div id="approvalList"></div>
    </div>

    <div id="content-history" style="display:none;">
        <div id="historyList"></div>
    </div>

    <div id="empty-state" style="display:none;">
        <div class="loader">☕️</div>
        <div style="font-weight:700; color:var(--gray)">Tutto aggiornato!<br>Nessuna richiesta pendente.</div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentTab = 'pending';

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tabPending').classList.toggle('active', tab === 'pending');
        document.getElementById('tabHistory').classList.toggle('active', tab === 'history');
        document.getElementById('content-pending').style.display = tab === 'pending' ? 'block' : 'none';
        document.getElementById('content-history').style.display = tab === 'history' ? 'block' : 'none';
        if(tab === 'history') loadHistory();
    }

    // --- 3. MONITORAGGIO RICHIESTE (修正花括号并增加新旧对比) ---
    db.ref('modelli_db').on('value', (snapshot) => {
        if (currentTab !== 'pending') return;
        const allModelli = snapshot.val();
        const container = document.getElementById('approvalList');
        const empty = document.getElementById('empty-state');
        container.innerHTML = '';
        let hasPending = false;

        if (allModelli) {
            for (let modId in allModelli) {
                if (allModelli[modId].pending) {
                    hasPending = true;
                    const p = allModelli[modId].pending; // 待审核数据
                    const c = allModelli[modId].current || {}; // 当前正式数据
                    const card = document.createElement('div');
                    card.className = 'approval-card';
                    
                    // 对比逻辑函数
                    const getVal = (key, label) => {
                        const oldV = c[key] || "-";
                        const newV = p[key] || "-";
                        if (p.type === 'aggiorna' && oldV !== newV) {
                            return `<div><div class="label">${label}</div><div class="value"><span style="text-decoration:line-through;color:var(--gray);font-size:11px;">${oldV}</span> ➔ <span style="color:var(--green)">${newV}</span></div></div>`;
                        }
                        return `<div><div class="label">${label}</div><div class="value">${newV}</div></div>`;
                    };

                    card.innerHTML = `
                        <div class="card-header">
                            <span class="id-badge">${modId}</span>
                            <span class="type-tag" style="border-color:${p.type==='crea'?'var(--green)':'var(--orange)'}">${p.type === 'crea' ? 'NUOVO' : 'UPDATE'}</span>
                        </div>
                        <div class="info-grid">
                            ${getVal('macchina', 'Macchina')}
                            ${getVal('posaggio', 'Posaggio')}
                            ${getVal('lama', 'Lama/Fresa')}
                            ${getVal('panto', 'Panto')}
                            ${getVal('scarico', 'Scarico')}
                            ${getVal('quota', 'Quota')}
                        </div>
                        <div class="note-area"><b>NOTE:</b> ${p.note || '-'}</div>
                        <div style="margin-top:10px; font-size:10px; color:#8e8e93; font-weight:700;">PROPOSTO DA: ${p.by.toUpperCase()}</div>
                        <div class="actions">
                            <button class="btn btn-reject" onclick="processAction('${modId}', 'REJECT')">RIFIUTA</button>
                            <button class="btn btn-approve" onclick="processAction('${modId}', 'APPROVE')">CONFERMA</button>
                        </div>
                    `;
                    container.appendChild(card);
                }
            }
        }
        empty.style.display = hasPending ? 'none' : 'block';
    });

    // --- 4. AZIONE: APPROVA O RIFIUTA ---
    async function processAction(id, action) {
        const snap = await db.ref(`modelli_db/${id}/pending`).once('value');
        const data = snap.val();
        if(!data) {
            alert("Errore: Dati non trovati o già elaborati.");
            return;
        }

        const auditRef = db.ref('audit_log').push();

        if (action === 'APPROVE') {
            await db.ref(`modelli_db/${id}/current`).set({
                macchina: data.macchina,
                posaggio: data.posaggio,
                lama: data.lama,
                panto: data.panto,
                scarico: data.scarico,
                quota: data.quota,
                note: data.note || "",
                at: data.at,
                by: data.by,
                verified_by: 'Alex',
                verified_at: Date.now()
            });

            await db.ref(`modelli_db/${id}/history`).push({
                type: data.type,
                by: data.by,
                at: Date.now(),
                confirmedBy: 'Alex',
                newSummary: `${data.macchina} / ${data.posaggio} / ${data.lama} / ${data.panto}° / ${data.scarico}° / ${data.quota}`
            });

            await auditRef.set({ id, action: 'OK', by: 'Alex', at: Date.now(), user: data.by });
            alert("✅ Modello " + id + " approvato!");
        } else {
            await auditRef.set({ id, action: 'NO', by: 'Alex', at: Date.now(), user: data.by });
            alert("❌ Richiesta rifiutata.");
        }
        await db.ref(`modelli_db/${id}/pending`).remove();
    }

    function loadHistory() {
        db.ref('audit_log').limitToLast(20).once('value', (snapshot) => {
            const container = document.getElementById('historyList');
            container.innerHTML = '';
            const data = snapshot.val();
            if(!data) return;

            Object.values(data).reverse().forEach(log => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.style.borderLeftColor = log.action === 'OK' ? 'var(--green)' : 'var(--red)';
                item.innerHTML = `
                    <div style="font-weight:800; font-size:15px;">
                        ${log.action === 'OK' ? '✅' : '❌'} Modello: ${log.id}
                    </div>
                    <div class="history-info">
                        ${new Date(log.at).toLocaleDateString()} ${new Date(log.at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}<br>
                        Richiesta di: ${log.user}
                    </div>
                `;
                container.appendChild(item);
            });
        });
    }
</script>
</body>
</html>
