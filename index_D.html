<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>D - Approval (Alex)</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #f2f2f7;
            --orange: #ff9500;
            --green: #34c759;
            --red: #ff3b30;
            --blue: #007aff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; 
            padding: calc(20px + env(safe-area-inset-top)) 20px 40px 20px;
        }
        .header { margin-bottom: 30px; }
        h1 { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        .subtitle { color: #8e8e93; font-size: 14px; font-weight: 600; }

        .card {
            background: #fff; border-radius: 20px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.2s;
        }
        .card:active { transform: scale(0.98); }
        .model-id { 
            display: inline-block; background: var(--orange); color: #fff; 
            padding: 4px 10px; border-radius: 8px; font-weight: 900; font-size: 14px; margin-bottom: 10px;
        }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .info-item { font-size: 12px; color: #8e8e93; font-weight: 600; }
        .info-val { display: block; color: #000; font-size: 15px; font-weight: 700; margin-top: 2px; }
        
        .note-box { 
            background: #f9f9f9; padding: 12px; border-radius: 12px; 
            font-size: 13px; color: #444; border: 1px solid #eee; margin-top: 10px;
        }
        .footer-btns { display: flex; gap: 12px; margin-top: 20px; }
        .btn { 
            flex: 1; border: none; padding: 16px; border-radius: 14px; 
            font-weight: 800; font-size: 14px; text-transform: uppercase; transition: 0.3s;
        }
        .btn-ok { background: var(--green); color: #fff; }
        .btn-no { background: #fff; color: var(--red); border: 2px solid var(--red); }
        
        #empty-state { text-align: center; margin-top: 100px; color: #8e8e93; font-weight: 700; }
        .badge-user { color: var(--blue); font-weight: 800; }
    </style>
</head>
<body>

    <div class="header">
        <h1>APPROVAL CENTER</h1>
        <div class="subtitle">Benvenuto Alex, gestisci le modifiche di <span class="badge-user">Shan Hu</span></div>
    </div>

    <div id="list">
        </div>

    <div id="empty-state" style="display:none;">
        ☕️ Tutto aggiornato!<br>Nessun modello in attesa.
    </div>

<script>
    // --- 使用你 B 端相同的配置 ---
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 实时监听待审核路径
    db.ref('pending_approvals').on('value', (snapshot) => {
        const data = snapshot.val();
        const container = document.getElementById('list');
        const empty = document.getElementById('empty-state');
        container.innerHTML = '';

        if (!data) {
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';

        for (let id in data) {
            const item = data[id];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="model-id">${id}</div>
                <div style="font-size:12px; font-weight:700;">PROPOSTA DA: <span class="badge-user">${item.by}</span></div>
                
                <div class="info-grid">
                    <div class="info-item">MACCHINA<span class="info-val">${item.macchina || '-'}</span></div>
                    <div class="info-item">POSAGGIO<span class="info-val">${item.posaggio || '-'}</span></div>
                    <div class="info-item">LAMA/FRESA<span class="info-val">${item.lama || '-'}</span></div>
                    <div class="info-item">PANTO/SCARICO<span class="info-val">${item.panto}° / ${item.scarico}°</span></div>
                </div>

                <div class="note-box">
                    <b>NOTE:</b> ${item.note || 'Nessuna nota aggiuntiva.'}
                </div>

                <div class="footer-btns">
                    <button class="btn btn-no" onclick="reject('${id}')">Rifiuta</button>
                    <button class="btn btn-ok" onclick="approve('${id}')">Conferma</button>
                </div>
            `;
            container.appendChild(card);
        }
    });

    async function approve(id) {
        if(!confirm("Confermi questi parametri come UFFICIALI?")) return;
        
        const snap = await db.ref(`pending_approvals/${id}`).once('value');
        const data = snap.val();

        // 1. 写入正式路径 (与B端查询路径一致)
        await db.ref(`modelli_db/${id}/current`).update({
            ...data,
            status: "OFFICIAL",
            approvatoDa: "Alex",
            dataApprovazione: Date.now()
        });

        // 2. 从待审中删除
        await db.ref(`pending_approvals/${id}`).remove();
        alert("Modello " + id + " aggiornato con successo!");
    }

    async function reject(id) {
        if(confirm("Sei sicuro di voler eliminare questa proposta?")) {
            await db.ref(`pending_approvals/${id}`).remove();
        }
    }
</script>
</body>
</html>
