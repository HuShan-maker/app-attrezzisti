<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>C - Management Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #ffffff; --red: #ff3b30; --orange: #ff9500; --gray: #f2f2f7; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; 
            padding: env(safe-area-inset-top) 20px 20px 20px;
            display: flex; flex-direction: column; height: 100vh;
        }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        h1 { font-size: 20px; font-weight: 900; margin: 0; text-transform: uppercase; }
        .reg-btn { background: #000; color: #fff; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; font-size: 13px; text-transform: uppercase; }

        /* 实时状态列表 */
        #activeList { flex: 1; overflow-y: auto; padding-top: 10px; }
        .call-card { 
            background: var(--gray); border-radius: 20px; padding: 20px; margin-bottom: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .call-info b { font-size: 28px; display: block; line-height: 1.1; }
        .call-info span { font-size: 13px; color: #8e8e93; font-weight: 600; display: block; margin-top: 4px; }
        .status-badge { padding: 10px 18px; border-radius: 12px; color: #fff; font-weight: 800; font-size: 12px; text-transform: uppercase; }
        .bg-orange { background: var(--orange); }
        .bg-red { background: var(--red); }

        /* 记录页面 */
        #historyPage { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; z-index: 100; flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }
        .v-nav { display: flex; align-items: center; padding: 20px; border-bottom: 1px solid #f2f2f7; position: relative; }
        .back-arrow { font-size: 28px; cursor: pointer; z-index: 2; }
        .v-title { position: absolute; left: 0; right: 0; text-align: center; font-size: 18px; font-weight: 900; margin: 0; text-transform: uppercase; }
        
        #logContainer { flex: 1; overflow-y: auto; padding: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
        th, td { padding: 14px 4px; text-align: center; border-bottom: 1px solid #f2f2f7; word-wrap: break-word; }
        th { font-size: 9px; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; }
        .td-linea { font-weight: 800; font-size: 15px; }

        /* 主页底部版权信息修正 */
        .footer-text { text-align: center; padding: 20px 0; font-size: 11px; font-weight: 800; color: #ccc; text-transform: uppercase; letter-spacing: 0.8px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>STATUS LINEE</h1>
        <button class="reg-btn" onclick="showHistory()">REGISTRO</button>
    </div>

    <div id="activeList">
        <!-- 实时数据渲染区 -->
    </div>

    <!-- 底部版权：© 2026 HU SHAN. ALL RIGHTS RESERVED. -->
    <div class="footer-text">© 2026 HU SHAN. ALL RIGHTS RESERVED.</div>

    <!-- 记录历史页面 -->
    <div id="historyPage">
        <div class="v-nav">
            <div class="back-arrow" onclick="closeHistory()">←</div>
            <h2 class="v-title">REGISTRO INTERVENTI</h2>
        </div>
        <div id="logContainer">
            <table>
                <thead>
                    <tr>
                        <th style="width: 20%;">LINEA</th>
                        <th style="width: 20%;">INIZIO</th> <!-- 新增开始时间 -->
                        <th style="width: 15%;">DUR.</th>
                        <th style="width: 20%;">TECNICO</th>
                        <th style="width: 25%;">CAUSALE</th>
                    </tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 监听实时数据
    db.ref('active_calls').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const list = document.getElementById('activeList');
        list.innerHTML = '';

        // 仅显示正在进行中（orange 或 red）的任务
        Object.keys(data).forEach(id => {
            const item = data[id];
            if(item.status === 'completed' || item.status === 'none') return;

            const timeStr = new Date(item.startA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const card = document.createElement('div');
            card.className = 'call-card';
            card.innerHTML = `
                <div class="call-info">
                    <b>${id}</b>
                    <span>Chiamata: ${timeStr}</span>
                </div>
                <div class="status-badge ${item.status === 'red' ? 'bg-red' : 'bg-orange'}">
                    ${item.status === 'red' ? 'Lavorando' : 'In attesa'}
                </div>
            `;
            list.appendChild(card);
        });
    });

    function showHistory() {
        document.getElementById('historyPage').style.display = 'flex';
        renderHistory();
    }

    function closeHistory() {
        document.getElementById('historyPage').style.display = 'none';
    }

    // 渲染历史记录（从 Firebase 获取已完成的数据）
    function renderHistory() {
        db.ref('active_calls').once('value', (snapshot) => {
            const data = snapshot.val() || {};
            const body = document.getElementById('logBody');
            body.innerHTML = '';

            const completedTasks = [];
            Object.keys(data).forEach(id => {
                if(data[id].status === 'completed') {
                    completedTasks.push({ id, ...data[id] });
                }
            });

            // 按时间倒序排列
            completedTasks.sort((a,b) => b.endT - a.endT).forEach(item => {
                const row = document.createElement('tr');
                const startStr = new Date(item.startA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                const duration = Math.round((item.endT - item.startA) / 60000);

                row.innerHTML = `
                    <td class="td-linea">${item.id}</td>
                    <td>${startStr}</td>
                    <td>${duration}m</td>
                    <td>${item.techName || '-'}</td>
                    <td style="font-size:11px;">${item.causale || '-'}</td>
                `;
                body.appendChild(row);
            });
        });
    }
</script>
</body>
</html>
