<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>C - Board Control v5.2</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #f2f2f7; --red: #ff3b30; --orange: #ff9500; --green: #34c759; --white: #ffffff; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; 
            padding: env(safe-area-inset-top) 10px 20px 10px;
            display: flex; flex-direction: column; height: 100vh;
        }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 10px; }
        h1 { font-size: 22px; font-weight: 900; margin: 0; letter-spacing: -1px; }
        .reg-btn { background: #000; color: #fff; border: none; padding: 10px 16px; border-radius: 12px; font-weight: 800; font-size: 12px; text-transform: uppercase; }

        #activeList { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

        /* 卡片重构：左侧固定加宽到 95px 确保 bis 放得下 */
        .card { 
            background: var(--white); border-radius: 18px; padding: 12px;
            display: grid; grid-template-columns: 95px 1fr 90px; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.02);
            min-height: 90px;
        }

        .card-linea { font-size: 24px; font-weight: 900; color: #000; text-align: center; border-right: 2px solid #f2f2f7; padding-right: 5px; }
        
        .card-details { padding-left: 12px; display: flex; flex-direction: column; gap: 2px; }
        .card-causale { font-size: 15px; font-weight: 800; color: #1c1c1e; text-transform: uppercase; margin-bottom: 2px; }
        .detail-row { font-size: 10.5px; font-weight: 600; color: #8e8e93; white-space: nowrap; }
        .detail-row b { color: #444; }

        /* 状态标签：色彩强化 */
        .card-status { 
            height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 900; text-transform: uppercase; text-align: center;
        }

        .st-waiting { background: var(--orange); color: #fff; animation: blink 1.5s infinite; }
        .st-working { background: var(--red); color: #fff; }
        .st-done { background: var(--green); color: #fff; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* 记录页面 */
        #historyPage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 100; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .v-nav { display: flex; align-items: center; padding: 20px; border-bottom: 1px solid #f2f2f7; }
        #logContainer { flex: 1; overflow-y: auto; padding: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
        th, td { padding: 12px 2px; text-align: center; border-bottom: 1px solid #f2f2f7; }
        th { color: #b0b0b8; text-transform: uppercase; font-size: 9px; }

        .footer-text { text-align: center; padding: 15px 0; font-size: 10px; font-weight: 800; color: #c7c7cc; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>BOARD CONTROL</h1>
        <button class="reg-btn" onclick="showHistory()">Registro</button>
    </div>

    <div id="activeList"></div>

    <div class="footer-text">© 2026 HU SHAN. ALL RIGHTS RESERVED.</div>

    <div id="historyPage">
        <div class="v-nav">
            <div style="font-size: 30px; cursor: pointer; padding-right: 20px;" onclick="closeHistory()">←</div>
            <h2 style="margin:0; font-size:18px; font-weight:900;">ARCHIVIO</h2>
        </div>
        <div id="logContainer">
            <table>
                <thead>
                    <tr>
                        <th style="width:20%">LINEA</th>
                        <th style="width:15%">START</th>
                        <th style="width:13%">WAIT</th> 
                        <th style="width:13%">WORK</th>
                        <th style="width:18%">TECH</th>
                        <th>CAUSA</th> 
                    </tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('active_calls').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const list = document.getElementById('activeList');
        list.innerHTML = '';
        const todayStr = new Date().toLocaleDateString('it-IT');

        const entries = Object.keys(data).map(id => ({ id, ...data[id] }));
        
        // 排序逻辑：正在维修的(RIPARAZIONE)排第一，等待中(CHIAMATA)第二，已完工(CONCLUSO)最后
        entries.sort((a, b) => {
            const score = { 'red': 1, 'orange': 2, 'completed': 3 };
            return (score[a.status] || 99) - (score[b.status] || 99) || b.startA - a.startA;
        });

        entries.forEach(item => {
            const itemDate = new Date(item.startA).toLocaleDateString('it-IT');
            if (itemDate !== todayStr) return;

            const card = document.createElement('div');
            card.className = 'card';

            const tStart = new Date(item.startA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            let wait = item.startB ? Math.round((item.startB - item.startA) / 60000) + "m" : "0m";
            let work = (item.endT && item.startB) ? Math.round((item.endT - item.startB) / 60000) + "m" : "0m";

            let stClass = "", stText = "", causaleText = "";

            if (item.status === 'orange') { 
                stClass = "st-waiting"; stText = "CHIAMATA"; 
                causaleText = "ATTESA...";
            } else if (item.status === 'red') { 
                stClass = "st-working"; stText = "RIPARAZIONE"; 
                causaleText = item.causale || "IN CORSO..."; 
            } else if (item.status === 'completed') { 
                stClass = "st-done"; stText = "CONCLUSO"; 
                causaleText = item.causale || "FINITO";
            }

            card.innerHTML = `
                <div class="card-linea">${item.id}</div>
                <div class="card-details">
                    <div class="card-causale">${causaleText}</div>
                    <div class="detail-row">Start: <b>${tStart}</b> | Wait: <b>${wait}</b></div>
                    <div class="detail-row">Tech: <b>${item.techName || '-'}</b> | Work: <b>${work}</b></div>
                </div>
                <div class="card-status ${stClass}">${stText}</div>
            `;
            list.appendChild(card);
        });
    });

    function showHistory() { document.getElementById('historyPage').style.display = 'flex'; renderHistory(); }
    function closeHistory() { document.getElementById('historyPage').style.display = 'none'; }

    function renderHistory() {
        db.ref('active_calls').once('value', (snapshot) => {
            const data = snapshot.val() || {};
            const body = document.getElementById('logBody');
            body.innerHTML = '';
            const logs = Object.keys(data).map(id => ({ id, ...data[id] })).filter(i => i.status === 'completed').sort((a, b) => b.endT - a.endT);
            logs.forEach(item => {
                const row = document.createElement('tr');
                const tStart = new Date(item.startA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                row.innerHTML = `
                    <td style="font-weight:900;">${item.id}</td>
                    <td>${tStart}</td>
                    <td style="color:var(--orange);font-weight:700;">${item.startB ? Math.round((item.startB-item.startA)/60000)+"m" : "0m"}</td>
                    <td style="color:var(--green);font-weight:700;">${(item.endT && item.startB)?Math.round((item.endT-item.startB)/60000)+"m":"0m"}</td>
                    <td>${item.techName || '-'}</td>
                    <td style="text-align:left;padding-left:5px;font-weight:600;font-size:10px;">${item.causale || '-'}</td>
                `;
                body.appendChild(row);
            });
        });
    }
</script>
</body>
</html>
