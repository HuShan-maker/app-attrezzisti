<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>C - Management Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #ffffff; --red: #ff3b30; --orange: #ff9500; --gray: #f2f2f7; --blue: #007aff; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; 
            padding: env(safe-area-inset-top) 20px 20px 20px;
            display: flex; flex-direction: column; height: 100vh;
        }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        h1 { font-size: 22px; font-weight: 900; margin: 0; letter-spacing: -0.5px; }
        .reg-btn { background: #000; color: #fff; border: none; padding: 12px 20px; border-radius: 14px; font-weight: 700; font-size: 13px; text-transform: uppercase; }

        /* 实时状态列表 */
        #activeList { flex: 1; overflow-y: auto; padding-top: 10px; }
        .call-card { 
            background: var(--gray); border-radius: 22px; padding: 20px; margin-bottom: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(0,0,0,0.02);
        }
        .call-info b { font-size: 32px; display: block; line-height: 1; color: #1c1c1e; }
        .call-info span { font-size: 13px; color: #8e8e93; font-weight: 600; display: block; margin-top: 6px; }
        
        .status-badge { padding: 10px 16px; border-radius: 12px; color: #fff; font-weight: 800; font-size: 11px; text-transform: uppercase; text-align: center; min-width: 100px; }
        .bg-orange { background: var(--orange); animation: blink 2s infinite; }
        .bg-red { background: var(--red); }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* 记录历史页面 */
        #historyPage { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; z-index: 100; flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }
        .v-nav { display: flex; align-items: center; padding: 20px; border-bottom: 1px solid #f2f2f7; }
        .back-arrow { font-size: 30px; cursor: pointer; padding-right: 20px; }
        
        #logContainer { flex: 1; overflow-y: auto; padding: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
        th, td { padding: 15px 2px; text-align: center; border-bottom: 1px solid #f2f2f7; word-wrap: break-word; }
        th { font-size: 9px; color: #b0b0b8; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .td-linea { font-weight: 900; font-size: 16px; color: #000; }
        .td-time { color: #8e8e93; font-weight: 500; }
        .td-duration { color: var(--blue); font-weight: 700; }

        .footer-text { text-align: center; padding: 20px 0; font-size: 11px; font-weight: 800; color: #d1d1d6; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>STATUS REAL-TIME</h1>
        <button class="reg-btn" onclick="showHistory()">REGISTRO</button>
    </div>

    <div id="activeList">
        </div>

    <div class="footer-text">© 2026 HU SHAN. ALL RIGHTS RESERVED.</div>

    <div id="historyPage">
        <div class="v-nav">
            <div class="back-arrow" onclick="closeHistory()">←</div>
            <h2 style="margin:0; font-size:18px; font-weight:900;">LOG INTERVENTI</h2>
        </div>
        <div id="logContainer">
            <table>
                <thead>
                    <tr>
                        <th style="width:18%">LINEA</th>
                        <th style="width:16%">INIZIO</th>
                        <th style="width:16%">ATTESA</th> <th style="width:16%">DURATA</th>
                        <th style="width:16%">TECH</th>
                        <th style="width:18%">CAUSA</th> </tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 实时更新主页
    db.ref('active_calls').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const list = document.getElementById('activeList');
        list.innerHTML = '';

        Object.keys(data).forEach(id => {
            const item = data[id];
            // 只显示橙色(等待)或红色(维修中)
            if(item.status === 'orange' || item.status === 'red') {
                const startStr = new Date(item.startA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                const card = document.createElement('div');
                card.className = 'call-card';
                card.innerHTML = `
                    <div class="call-info">
                        <b>${id}</b>
                        <span>Iniziato alle: ${startStr}</span>
                    </div>
                    <div class="status-badge ${item.status === 'red' ? 'bg-red' : 'bg-orange'}">
                        ${item.status === 'red' ? 'In Riparazione' : 'In Attesa'}
                    </div>
                `;
                list.appendChild(card);
            }
        });
    });

    function showHistory() {
        document.getElementById('historyPage').style.display = 'flex';
        renderHistory();
    }

    function closeHistory() {
        document.getElementById('historyPage').style.display = 'none';
    }

    function renderHistory() {
        db.ref('active_calls').once('value', (snapshot) => {
            const data = snapshot.val() || {};
            const body = document.getElementById('logBody');
            body.innerHTML = '';

            const completed = [];
            Object.keys(data).forEach(id => {
                if(data[id].status === 'completed') completed.push({id, ...data[id]});
            });

            completed.sort((a,b) => b.endT - a.endT).forEach(item => {
                const row = document.createElement('tr');
                
                const timeInizio = new Date(item.startA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                
                // 计算等待时间 (B端接单时间 - A端呼叫时间)
                let waitTime = "0m";
                if(item.startB && item.startA) {
                    waitTime = Math.round((item.startB - item.startA) / 60000) + "m";
                }

                // 计算维修时长 (完成时间 - B端接单时间)
                let workDuration = "0m";
                if(item.endT && item.startB) {
                    workDuration = Math.round((item.endT - item.startB) / 60000) + "m";
                }

                row.innerHTML = `
                    <td class="td-linea">${item.id}</td>
                    <td class="td-time">${timeInizio}</td>
                    <td style="color:#ff9500; font-weight:700;">${waitTime}</td>
                    <td class="td-duration">${workDuration}</td>
                    <td>${item.techName || '-'}</td>
                    <td style="font-size:10px; color:#666;">${item.causale || '-'}</td>
                `;
                body.appendChild(row);
            });
        });
    }
</script>
</body>
</html>
