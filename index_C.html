<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>C - Management Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #ffffff; --red: #ff3b30; --orange: #ff9500; --gray: #f2f2f7; --blue: #007aff; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; 
            padding: env(safe-area-inset-top) 20px 20px 20px;
            display: flex; flex-direction: column; height: 100vh;
        }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        h1 { font-size: 22px; font-weight: 900; margin: 0; letter-spacing: -0.5px; }
        .reg-btn { background: #000; color: #fff; border: none; padding: 12px 20px; border-radius: 14px; font-weight: 700; font-size: 13px; text-transform: uppercase; }

        /* 实时状态列表 - 小卡片容器 */
        #activeList { 
            flex: 1; 
            overflow-y: auto; 
            padding-top: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); /* 自动适配宽度的卡片流 */
            gap: 15px;
            align-content: flex-start;
        }

        /* 卡片样式回归 */
        .call-card { 
            background: var(--gray); 
            border-radius: 22px; 
            padding: 18px; 
            display: flex; 
            flex-direction: column;
            justify-content: space-between;
            min-height: 140px;
            position: relative;
            border: 1px solid rgba(0,0,0,0.03);
            transition: transform 0.2s;
        }

        .card-id { font-size: 32px; font-weight: 900; color: #1c1c1e; line-height: 1; }
        .card-time { font-size: 12px; color: #8e8e93; font-weight: 600; margin-top: 5px; }
        
        /* 底部状态条 */
        .status-bar {
            margin-top: 15px;
            padding: 8px 12px;
            border-radius: 12px;
            color: #fff;
            font-weight: 800;
            font-size: 11px;
            text-transform: uppercase;
            text-align: center;
        }

        /* 维修原因显示 */
        .card-causale {
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
            color: #444;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.2;
        }

        .bg-orange { background: var(--orange); animation: blink 2s infinite; }
        .bg-red { background: var(--red); }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

        /* 记录历史页面 */
        #historyPage { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; z-index: 100; flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }
        .v-nav { display: flex; align-items: center; padding: 20px; border-bottom: 1px solid #f2f2f7; }
        .back-arrow { font-size: 30px; cursor: pointer; padding-right: 20px; }
        
        #logContainer { flex: 1; overflow-y: auto; padding: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
        th, td { padding: 15px 2px; text-align: center; border-bottom: 1px solid #f2f2f7; word-wrap: break-word; }
        th { font-size: 9px; color: #b0b0b8; text-transform: uppercase; }
        
        .footer-text { text-align: center; padding: 20px 0; font-size: 11px; font-weight: 800; color: #d1d1d6; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>STATUS LINEE</h1>
        <button class="reg-btn" onclick="showHistory()">REGISTRO</button>
    </div>

    <div id="activeList">
        <!-- 实时卡片在此生成 -->
    </div>

    <div class="footer-text">© 2026 HU SHAN. ALL RIGHTS RESERVED.</div>

    <!-- 记录历史页面 -->
    <div id="historyPage">
        <div class="v-nav">
            <div class="back-arrow" onclick="closeHistory()">←</div>
            <h2 style="margin:0; font-size:18px; font-weight:900;">LOG INTERVENTI</h2>
        </div>
        <div id="logContainer">
            <table>
                <thead>
                    <tr>
                        <th style="width:18%">LINEA</th>
                        <th style="width:16%">INIZIO</th>
                        <th style="width:16%">ATTESA</th> 
                        <th style="width:16%">DURATA</th>
                        <th style="width:16%">TECH</th>
                        <th style="width:18%">CAUSA</th> 
                    </tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 实时更新主页卡片
    db.ref('active_calls').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const list = document.getElementById('activeList');
        list.innerHTML = '';

        Object.keys(data).forEach(id => {
            const item = data[id];
            // 只显示正在进行（等待或修理）的任务
            if(item.status === 'orange' || item.status === 'red') {
                const startStr = new Date(item.startA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                
                const card = document.createElement('div');
                card.className = 'call-card';
                
                // 动态构造卡片内容
                let statusText = item.status === 'red' ? 'In Riparazione' : 'In Attesa';
                let causaleText = item.status === 'red' ? (item.causale || 'In attesa di dettagli...') : '';

                card.innerHTML = `
                    <div>
                        <div class="card-id">${id}</div>
                        <div class="card-time">Dalle: ${startStr}</div>
                        ${item.status === 'red' ? `<div class="card-causale">🔧 ${causaleText}</div>` : ''}
                    </div>
                    <div class="status-bar ${item.status === 'red' ? 'bg-red' : 'bg-orange'}">
                        ${statusText}
                    </div>
                `;
                list.appendChild(card);
            }
        });
    });

    function showHistory() {
        document.getElementById('historyPage').style.display = 'flex';
        renderHistory();
    }

    function closeHistory() {
        document.getElementById('historyPage').style.display = 'none';
    }

    function renderHistory() {
        db.ref('active_calls').once('value', (snapshot) => {
            const data = snapshot.val() || {};
            const body = document.getElementById('logBody');
            body.innerHTML = '';

            const completed = [];
            Object.keys(data).forEach(id => {
                if(data[id].status === 'completed') completed.push({id, ...data[id]});
            });

            completed.sort((a,b) => b.endT - a.endT).forEach(item => {
                const row = document.createElement('tr');
                const timeInizio = new Date(item.startA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                let waitTime = item.startB ? Math.round((item.startB - item.startA) / 60000) + "m" : "-";
                let workDuration = (item.endT && item.startB) ? Math.round((item.endT - item.startB) / 60000) + "m" : "-";

                row.innerHTML = `
                    <td style="font-weight:900;">${item.id}</td>
                    <td style="color:#8e8e93;">${timeInizio}</td>
                    <td style="color:#ff9500; font-weight:700;">${waitTime}</td>
                    <td style="color:#007aff; font-weight:700;">${workDuration}</td>
                    <td>${item.techName || '-'}</td>
                    <td style="font-size:10px; color:#666;">${item.causale || '-'}</td>
                `;
                body.appendChild(row);
            });
        });
    }
</script>
</body>
</html>
