<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
    <title>C - Monitoring Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; padding: 25px; color: #000; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h1 { font-size: 20px; font-weight: 900; margin: 0; text-transform: uppercase; }
        h2 { text-transform: uppercase; font-size: 13px; letter-spacing: 1px; color: #8e8e93; margin: 30px 0 15px 0; }
        
        /* 实时卡片 */
        #activeGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card { background: #fff; padding: 25px; border-radius: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); text-align: center; position: relative; border-left: 8px solid #ccc; transition: 0.3s; }
        .card.orange { border-left-color: #ff9500; animation: pulse 1.5s infinite; }
        .card.red { border-left-color: #ff3b30; }
        .card .id { font-size: 32px; font-weight: 900; margin-bottom: 5px; }
        .card .status-label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: #8e8e93; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(0.98); } }

        /* 历史表格 */
        .table-wrap { background: #fff; border-radius: 25px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.04); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 18px 20px; text-align: left; border-bottom: 1px solid #f2f2f7; font-size: 15px; }
        th { background: #fafafa; color: #8e8e93; font-size: 10px; text-transform: uppercase; font-weight: 800; }
        .tech-name { color: #8e8e93; font-size: 13px; font-weight: 600; }
        .duration { font-family: monospace; font-weight: 700; }
        .causale { color: #555; }
        .tag { padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; display: inline-block; }
        .tag-wait { background: #fff4e5; color: #ff9500; }
        .tag-work { background: #ffebeb; color: #ff3b30; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Dashboard Controllo</h1>
        <div id="clock" style="font-weight: 700; color: #8e8e93;"></div>
    </div>

    <h2>Live Operations</h2>
    <div id="activeGrid"></div>

    <h2>History Logs (Permanent Cloud)</h2>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th style="width: 150px;">Time</th>
                    <th style="width: 100px;">Linea</th>
                    <th style="width: 150px;">Technician</th>
                    <th style="width: 180px;">Durations (A / D)</th>
                    <th>Causale Intervento</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBXn_liUqQJtp1hucwsuERhZ4oxCdBPg",
        authDomain: "luxottica-app.firebaseapp.com",
        databaseURL: "https://luxottica-app-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "luxottica-app",
        appId: "1:288317846374:web:c8ec72c5ecd910840f4ea7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 时间显示
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT');
    }, 1000);

    // 1. 监听活跃任务 (修完即消失)
    db.ref('active_calls').on('value', (snap) => {
        const data = snap.val() || {};
        const grid = document.getElementById('activeGrid');
        grid.innerHTML = '';
        
        const activeIds = Object.keys(data).filter(id => data[id].status !== 'completed');
        
        activeIds.forEach(id => {
            const item = data[id];
            const card = document.createElement('div');
            card.className = `card ${item.status}`;
            card.innerHTML = `
                <div class="status-label">${item.status === 'orange' ? 'Waiting' : 'Working'}</div>
                <div class="id">${id}</div>
                <div style="font-size:11px; color:#aaa; margin-top:5px;">Started: ${new Date(item.startA).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
            `;
            grid.appendChild(card);
        });
        
        if(activeIds.length === 0) grid.innerHTML = '<div style="color:#aaa; font-style:italic; padding:20px;">All lines running normally.</div>';
    });

    // 2. 监听永久历史记录
    db.ref('history_logs').orderByChild('ts').limitToLast(50).on('value', (snap) => {
        const data = snap.val() || {};
        const body = document.getElementById('historyBody');
        body.innerHTML = '';
        
        const sorted = Object.values(data).sort((a,b) => b.ts - a.ts);
        
        sorted.forEach(l => {
            const row = `<tr>
                <td><div style="font-weight:700;">${l.day}</div><div style="font-size:12px; color:#8e8e93;">${l.time}</div></td>
                <td><b style="font-size:18px;">${l.linea}</b></td>
                <td class="tech-name">${l.techName}</td>
                <td>
                    <span class="tag tag-wait">A: ${l.wait}m</span>
                    <span class="tag tag-work">D: ${l.work}m</span>
                </td>
                <td class="causale">${l.causale}</td>
            </tr>`;
            body.insertAdjacentHTML('beforeend', row);
        });
    });
</script>
</body>
</html>
